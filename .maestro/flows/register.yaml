appId: ${MAESTRO_APP_ID}
onFlowStart:
  - runScript: ../api.js
---
- evalScript: ${output.username = faker.internet().username()}
- evalScript: ${output.email = faker.internet().emailAddress()}
# - runFlow:
#     when:
#       platform: iOS
#     file: _ios-toggle-autofill-passwords.yaml
- runFlow: _launch-and-onboard.yaml
- tapOn: Create Account
- tapOn: Username
- inputText: ${output.username}-testing
- tapOn: Enter your email
- inputText: ${output.email}
- tapOn: Password
- inputText: password
- tapOn: Confirm Password
- inputText: password
- hideKeyboard
- scrollUntilVisible:
    element:
      id: register-legal-consent
- tapOn:
    id: register-legal-consent
- scrollUntilVisible:
    element: Register
- tapOn: Register
- runFlow: _opt-into-analytics.yaml
- tapOn:
    id: app-drawer-menu-button
- tapOn: Profile
- assertVisible:
    text: Profile
    above:
      text: ${output.email}
- assertVisible:
    id: analytics-opt-in-switch
    checked: true
    rightOf: Enable Analytics
- evalScript: ${output.api.deleteUser(output.email)}
