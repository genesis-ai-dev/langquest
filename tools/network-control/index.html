<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Network Control — Android Emulator</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --dim: #8892a4;
    --green: #2ecc71;
    --red: #e74c3c;
    --radius: 8px;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 560px;
    margin: 0 auto;
  }

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 13px; margin-bottom: 20px; }

  .device-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--dim);
    margin-bottom: 10px;
  }

  /* ── Status ─────────────────────────────────────────── */

  .status-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot.on { background: var(--green); }
  .dot.off { background: var(--red); }

  .status-detail {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    margin-bottom: 20px;
    white-space: pre-wrap;
    line-height: 1.6;
    max-height: 120px;
    overflow-y: auto;
  }

  /* ── Presets ────────────────────────────────────────── */

  .presets {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
  }

  .preset-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    font-size: 14px;
    text-align: left;
  }

  .preset-btn:hover { border-color: var(--accent); background: #1a2744; }
  .preset-btn.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .preset-btn:disabled { opacity: 0.5; cursor: wait; }
  .preset-btn .name { font-weight: 600; }
  .preset-btn .desc { color: var(--dim); font-size: 12px; }
  .preset-btn .indicator { color: var(--accent); font-size: 18px; min-width: 16px; text-align: right; }

  /* ── Toggles ────────────────────────────────────────── */

  .toggles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .toggle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toggle-label { font-size: 14px; font-weight: 500; }

  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .toggle-switch input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 12px;
    transition: background 0.2s;
  }

  .toggle-switch input:checked + .toggle-track { background: var(--green); }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }

  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(20px); }

  /* ── Log ────────────────────────────────────────────── */

  .log {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    min-height: 20px;
  }
</style>
</head>
<body>

<h1>Network Control</h1>
<p class="subtitle">Android Emulator · tc + iptables</p>

<div class="device-info" id="device-info">Checking devices...</div>

<div class="section-title">Status</div>
<div class="status-bar" id="status-bar"></div>
<div class="status-detail" id="status-detail"></div>

<div class="section-title">Presets</div>
<div class="presets" id="presets"></div>

<div class="section-title">Manual Toggles</div>
<div class="toggles" id="toggles"></div>

<div class="log" id="log">Ready.</div>

<script>
const PRESETS = [
  { key: "full",             name: "Full Internet",       desc: "No throttling" },
  { key: "50m",              name: "50 Mbps",             desc: "Fast broadband / 4G" },
  { key: "10m",              name: "10 Mbps",             desc: "Moderate broadband / good 3G" },
  { key: "5m",               name: "5 Mbps",              desc: "Slow broadband" },
  { key: "1m",               name: "1 Mbps",              desc: "Poor connection" },
  { key: "250k",             name: "250 Kbps",            desc: "Very poor / 2G" },
  { key: "50k",              name: "50 Kbps",             desc: "Barely usable" },
  { key: "wifi_no_internet", name: "WiFi (No Internet)",  desc: "WiFi connected, all traffic rejected" },
  { key: "airplane",         name: "Airplane Mode",       desc: "All radios off" },
];

const TOGGLES = [
  { key: "wifi",     label: "WiFi" },
  { key: "airplane", label: "Airplane" },
];

const $ = id => document.getElementById(id);
let activePreset = null;
let busy = false;

function log(msg) { $("log").textContent = msg; }

function renderStatus(status) {
  $("status-bar").innerHTML = [
    pill("WiFi", status.wifi),
    pill("Airplane", status.airplane),
  ].join("");

  const lines = [];
  if (status.tc) lines.push("tc: " + status.tc);
  if (status.iptables) lines.push("iptables OUTPUT:\n" + status.iptables);
  $("status-detail").textContent = lines.join("\n\n") || "(no rules active)";

  TOGGLES.forEach(t => {
    const cb = document.getElementById("toggle-" + t.key);
    if (cb) cb.checked = status[t.key];
  });
}

function pill(label, on) {
  return `<span class="status-pill"><span class="dot ${on ? "on" : "off"}"></span>${label}</span>`;
}

function renderPresets() {
  $("presets").innerHTML = PRESETS.map(p => `
    <button class="preset-btn ${activePreset === p.key ? "active" : ""}" data-key="${p.key}" ${busy ? "disabled" : ""}>
      <span><span class="name">${p.name}</span><br><span class="desc">${p.desc}</span></span>
      <span class="indicator">${activePreset === p.key ? "●" : ""}</span>
    </button>
  `).join("");

  $("presets").querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => applyPreset(btn.dataset.key));
  });
}

function renderToggles() {
  $("toggles").innerHTML = TOGGLES.map(t => `
    <div class="toggle-card">
      <span class="toggle-label">${t.label}</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-${t.key}" data-target="${t.key}">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  `).join("");

  $("toggles").querySelectorAll("input").forEach(cb => {
    cb.addEventListener("change", () => toggle(cb.dataset.target, cb.checked));
  });
}

async function applyPreset(key) {
  if (busy) return;
  busy = true;
  activePreset = key;
  renderPresets();
  const preset = PRESETS.find(p => p.key === key);
  log(`Applying ${preset.name}...`);

  try {
    const res = await fetch("/api/preset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key }),
    }).then(r => r.json());

    if (res.ok) {
      renderStatus(res.status);
      log(`Applied ${preset.name}`);
    } else {
      log("Error: " + res.error);
    }
  } catch (e) {
    log("Request failed: " + e.message);
  }
  busy = false;
  renderPresets();
}

async function toggle(target, on) {
  if (busy) return;
  busy = true;
  activePreset = null;
  renderPresets();
  log(`Toggling ${target} ${on ? "ON" : "OFF"}...`);

  try {
    const res = await fetch("/api/toggle", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ target, on }),
    }).then(r => r.json());

    if (res.ok) {
      renderStatus(res.status);
      log(`${target} → ${on ? "ON" : "OFF"}`);
    }
  } catch (e) {
    log("Request failed: " + e.message);
  }
  busy = false;
  renderPresets();
}

async function init() {
  renderPresets();
  renderToggles();

  try {
    const devices = await fetch("/api/devices").then(r => r.json());
    $("device-info").textContent = devices.devices;

    const status = await fetch("/api/status").then(r => r.json());
    renderStatus(status);
    log("Ready.");
  } catch (e) {
    $("device-info").textContent = "Could not connect to server.";
    log("Error: " + e.message);
  }
}

init();
</script>
</body>
</html>
