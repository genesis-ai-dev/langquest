name: Deploy to production

on:
  push:
    branches: ['main']
    paths:
      - '**'
      - '!**/*.md'
      - '!readme_images/**'
      - '!scripts/**'
      - '!tooling/**'
      - '!restore-remote-db-backup/**'
      - '!debug_closure_issue.sql'
      - '!supabase/**'
      - '!supabase/migrations/*.sql'
      - '!**/*.backup'
      - '!.github/**'
      - '!.prettierignore'
      - '!prettier.config.mjs'
      - '!eslint.config.mts'
      - '!knip.json'
      - '!deno.json'
      - '!.cursor/**'
      - '!.vscode/**'
      - '!.agents/**'
      - '!.maestro/**'

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    environment: production
  get_android_build:
    name: Check for existing android build
    needs: [fingerprint]
    type: get-build
    environment: production
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: production
  get_ios_build:
    name: Check for existing ios build
    needs: [fingerprint]
    type: get-build
    environment: production
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production
  build_android:
    name: Build Android
    needs: [get_android_build]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    environment: production
    env:
      POSTHOG_CLI_PROJECT_ID: ${{ env.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_API_KEY: ${{ env.POSTHOG_CLI_API_KEY }}
    params:
      platform: android
      profile: production
  build_ios:
    name: Build iOS
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    environment: production
    env:
      POSTHOG_CLI_PROJECT_ID: ${{ env.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_API_KEY: ${{ env.POSTHOG_CLI_API_KEY }}
    params:
      platform: ios
      profile: production
  submit_android_build:
    name: Submit Android Build
    needs: [build_android]
    type: submit
    environment: production
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
  submit_ios_build:
    name: Submit iOS Build
    needs: [build_ios]
    type: submit
    environment: production
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
  publish_android_update:
    name: Publish Android update
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id }}
    environment: production
    env:
      POSTHOG_CLI_PROJECT_ID: ${{ env.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_API_KEY: ${{ env.POSTHOG_CLI_API_KEY }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Publish OTA update
        run: eas update --branch production --platform android --non-interactive
      - name: Upload PostHog source maps
        run: npm run posthog:upload-sourcemaps
  publish_ios_update:
    name: Publish iOS update
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    environment: production
    env:
      POSTHOG_CLI_PROJECT_ID: ${{ env.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_API_KEY: ${{ env.POSTHOG_CLI_API_KEY }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Publish OTA update
        run: eas update --branch production --platform ios --non-interactive
      - name: Upload PostHog source maps
        run: npm run posthog:upload-sourcemaps
