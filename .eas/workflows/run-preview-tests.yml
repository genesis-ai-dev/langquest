name: Run preview tests

on:
  pull_request:
    types: [opened, synchronize]
    branches: ['dev']

    paths:
      - '**'
      - '!**/*.md'
      - '!readme_images/**'
      - '!scripts/**'
      - '!tooling/**'
      - '!restore-remote-db-backup/**'
      - '!debug_closure_issue.sql'
      - '!supabase/**'
      - '!**/*.backup'
      - '!.github/**'
      - '!.prettierignore'
      - '!prettier.config.mjs'
      - '!eslint.config.mts'
      - '!knip.json'
      - '!deno.json'
      - '!.cursor/**'
      - '!.vscode/**'
      - '!.agents/**'

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    environment: preview

  android_get_build:
    name: Check for existing android build
    needs: [fingerprint]
    type: get-build
    environment: preview
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: preview
      platform: android

  ios_get_build:
    name: Check for existing ios build
    needs: [fingerprint]
    type: get-build
    environment: preview
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: preview-simulator
      platform: ios

  android_repack:
    name: Repack Android
    needs: [android_get_build]
    if: ${{ needs.android_get_build.outputs.build_id }}
    type: repack
    environment: preview
    runs_on: linux-medium
    params:
      build_id: ${{ needs.android_get_build.outputs.build_id }}

  android_build:
    name: Build Android
    needs: [android_get_build]
    if: ${{ !needs.android_get_build.outputs.build_id }}
    type: build
    environment: preview
    runs_on: linux-medium
    params:
      platform: android
      profile: preview

  ios_repack:
    name: Repack iOS
    needs: [ios_get_build]
    if: ${{ needs.ios_get_build.outputs.build_id }}
    type: repack
    environment: preview
    runs_on: macos-medium
    params:
      build_id: ${{ needs.ios_get_build.outputs.build_id }}

  ios_build:
    name: Build iOS
    needs: [ios_get_build]
    if: ${{ !needs.ios_get_build.outputs.build_id }}
    type: build
    environment: preview
    runs_on: macos-medium
    params:
      platform: ios
      profile: preview-simulator

  android_maestro:
    name: Run Android Maestro Tests
    after: [android_repack, android_build]
    type: maestro
    environment: preview
    image: latest
    runs_on: linux-medium-nested-virtualization
    params:
      build_id: ${{ needs.android_repack.outputs.build_id || needs.android_build.outputs.build_id }}
      record_screen: true
      device_identifier: 'pixel_6'
      android_system_image_package: 'system-images;android-31;default;x86_64'
      flow_path:
        [
          '.maestro/flows/register.yaml',
          '.maestro/flows/sign-in.yaml',
          '.maestro/flows/reset-password.yaml'
        ]

  ios_maestro:
    name: Run iOS Maestro Tests
    after: [ios_repack, ios_build]
    type: maestro
    environment: preview
    image: latest
    runs_on: macos-large
    params:
      record_screen: true
      device_identifier: 'iPhone 16e'
      build_id: ${{ needs.ios_repack.outputs.build_id || needs.ios_build.outputs.build_id }}
      flow_path:
        [
          '.maestro/flows/register.yaml',
          '.maestro/flows/sign-in.yaml',
          '.maestro/flows/reset-password.yaml'
        ]
    hooks:
      after_checkout:
        - run: |
            DEVICE_ID=$(xcrun simctl list devices -j | jq -r '.devices[][] | select(.name=="iPhone 16e") | .udid') && \
            echo "Booted device ID: $DEVICE_ID" && \
            # Source - https://stackoverflow.com/a/76105538
            # Posted by Jonathan.
            # Retrieved 2026-03-04, License - CC BY-SA 4.0
            plutil -replace restrictedBool.allowPasswordAutoFill.value -bool NO ~/Library/Developer/CoreSimulator/Devices/$DEVICE_ID/data/Containers/Shared/SystemGroup/systemgroup.com.apple.configurationprofiles/Library/ConfigurationProfiles/UserSettings.plist && \
            plutil -replace restrictedBool.allowPasswordAutoFill.value -bool NO ~/Library/Developer/CoreSimulator/Devices/$DEVICE_ID/data/Library/UserConfigurationProfiles/EffectiveUserSettings.plist && \
            plutil -replace restrictedBool.allowPasswordAutoFill.value -bool NO ~/Library/Developer/CoreSimulator/Devices/$DEVICE_ID/data/Library/UserConfigurationProfiles/PublicInfo/PublicEffectiveUserSettings.plist
      before_maestro_tests:
        - run: |
            DEVICE_ID=$(xcrun simctl list devices -j | jq -r '.devices[][] | select(.name=="iPhone 16e") | .udid') && \
            # Disable Safari onboarding popovers (View Bookmarks, Share Menu, Open Tabs)
            # Launch Safari to create container and initialize prefs
            xcrun simctl launch $DEVICE_ID com.apple.mobilesafari >/dev/null 2>&1 && sleep 3 && \
            SAFARI_PREFS="$(xcrun simctl get_app_container $DEVICE_ID com.apple.mobilesafari data)/Library/Preferences/com.apple.mobilesafari.plist" && \
            echo "Safari prefs path: $SAFARI_PREFS" && \
            ls -la "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Delete WBSOnboardingStatesDefaultsKeyV0.2" "$SAFARI_PREFS" 2>/dev/null || true && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2 dict" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:CustomizeStartPage integer 2" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:EnableCloudSync integer 2" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:EnableHighlights integer 2" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:ExtensionsDiscovery integer 2" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:SetDefaultBrowser integer 2" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:SetDefaultSearchEngine integer 2" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:TipForMoreButton integer 3" "$SAFARI_PREFS" && \
            /usr/libexec/PlistBuddy -c "Add WBSOnboardingStatesDefaultsKeyV0.2:TipForPrivateBrowsing integer 2" "$SAFARI_PREFS" && \
            plutil -replace SFDidDismissSwipeToTabOverviewTip -bool YES "$SAFARI_PREFS" && \
            xcrun simctl spawn $DEVICE_ID defaults write com.apple.mobilesafari ShownOnboardingExperience -bool YES && \
            xcrun simctl terminate $DEVICE_ID com.apple.mobilesafari >/dev/null 2>&1
